<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Radio Colombia - Emisoras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <header>
        <h1>
            Radio Emisoras de Colombia
        </h1>
        <p>Informacion radial colombiana: Nombre, Frecuencia, Banda y Ciudad.</p>
    </header>
    <div class="content">
        <div class="stats" id="statsInfo">Cargando emisoras...</div>

        <div class="table-wrapper">
            <table id="radiosTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Frecuencia</th>
                        <th>Banda</th>
                        <th>Ciudad</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" style="text-align:center">Cargando datos desde API-Colombia...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="footer-note">
            Realizado con ❤️ por Nelson Sierra
        </div>
    </div>
</div>

<script>
    let allRadios = [];
    const statsInfo = document.getElementById('statsInfo');
    const tableBody = document.getElementById('tableBody');

    async function fetchRadios() {
        try {
            const response = await fetch('https://api-colombia.com/api/v1/Radio');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!Array.isArray(data)) return [];
            
            return data.map(radio => ({
                id: radio.id ?? Math.random(),
                name: radio.name?.trim() || "Sin nombre",
                frequency: (radio.frequency !== undefined && radio.frequency !== null) ? Number(radio.frequency) : 0,
                band: radio.band?.toString().toUpperCase() || "Desconocida",
                city: radio.city && typeof radio.city === 'object' ? (radio.city.name || "Ciudad no especificada") : (radio.city || "No disponible")
            }));
        } catch (error) {
            console.error("Error al cargar emisoras:", error);
            statsInfo.innerText = "Error al cargar datos. Verifique conexion.";
            return [];
        }
    }

    function updateStatsAndTable(radios) {
        const count = radios.length;
        statsInfo.innerHTML = count + " emisora" + (count !== 1 ? 's' : '') + " encontrada" + (count !== 1 ? 's' : '');

        if (!radios.length) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center">No hay emisoras disponibles</td></tr>';
            return;
        }

        let htmlRows = '';
        for (const radio of radios) {
            const displayFreq = radio.frequency && radio.frequency > 0 ? 
                (radio.band === 'FM' ? radio.frequency + ' MHz' : (radio.band === 'AM' ? radio.frequency + ' kHz' : radio.frequency)) : '—';
            htmlRows += `
                <tr>
                    <td style="font-weight:500">${escapeHtml(radio.name)}</td>
                    <td>${displayFreq}</td>
                    <td><span class="badge-band">${escapeHtml(radio.band)}</span></td>
                    <td>${escapeHtml(radio.city)}</td>
                </tr>
            `;
        }
        tableBody.innerHTML = htmlRows;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function init() {
        statsInfo.innerText = "Descargando emisoras desde API-Colombia...";
        allRadios = await fetchRadios();
        
        if (!allRadios.length) {
            statsInfo.innerText = "No se pudieron cargar emisoras. Revise su red o el estado de la API.";
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center">Error: No hay datos disponibles.</td></tr>';
            return;
        }
        
        updateStatsAndTable(allRadios);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
